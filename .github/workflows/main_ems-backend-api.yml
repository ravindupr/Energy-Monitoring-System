# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - ems-backend-api

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4   # ✅ updated
        with:
          node-version: '18'          # ✅ safer for Azure

      - name: Install dependencies
        working-directory: backend    # ✅ FIX
        run: npm install

      - name: Build (optional)
        working-directory: backend
        run: npm run build --if-present

      - name: Test (optional)
        working-directory: backend
        run: npm run test --if-present

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: backend               # ✅ FIX (only backend)

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: node-app

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ems-backend-api
          slot-name: Production
          package: .                 # ✅ IMPORTANT (artifact is already backend)
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_5FE307BE8F074B8B905AC17A7280AAA8 }}
